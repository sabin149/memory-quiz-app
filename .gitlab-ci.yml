# Lint, typecheck, and test on merge requests and branch pushes.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Avoid duplicate pipelines when a branch has an open MR.
    - if: $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - check

default:
  image: node:22
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm ci --cache .npm --prefer-offline --no-audit --no-fund

# The app reads EXPO_PUBLIC_* at bundle time; CI only needs placeholders.
variables:
  EXPO_PUBLIC_APPWRITE_ENDPOINT: "https://ci.invalid/v1"
  EXPO_PUBLIC_APPWRITE_PROJECT_ID: "ci-placeholder"

lint:
  stage: check
  needs: []
  script:
    - npm run lint

typecheck:
  stage: check
  needs: []
  script:
    - npm run typecheck

test:
  stage: check
  needs: []
  script:
    - npx jest --ci --coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d.]+)/'
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: junit.xml
    paths:
      - coverage/
